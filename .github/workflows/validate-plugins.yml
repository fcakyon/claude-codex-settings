name: Validate Plugins

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - ".claude-plugin/**"
      - ".codex-plugin/**"
      - ".cursor-plugin/**"
      - ".agents/**"
      - ".github/scripts/**"
      - ".github/workflows/validate-plugins.yml"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "GEMINI.md"
  pull_request:
    branches: [main]
    paths:
      - "plugins/**"
      - ".claude-plugin/**"
      - ".codex-plugin/**"
      - ".cursor-plugin/**"
      - ".agents/**"
      - ".github/scripts/**"
      - ".github/workflows/validate-plugins.yml"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "GEMINI.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate plugins
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python .github/scripts/validate_plugins.py
